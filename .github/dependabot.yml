version: 2
updates:
  # Python dependencies. The "/" directory is scanned recursively, so this
  # one entry covers pyproject.toml in the root (runtime + dev/test extras)
  # and scripts/requirements.txt.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      python-dependencies:
        patterns: ["*"]

  # GitHub Actions used by the workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns: ["*"]

  # Docker base image (the Dockerfile FROM digest). Keeps the digest-pinned
  # python:3.14-alpine base current instead of going stale (arc42 §11 risk R5).
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      docker:
        patterns: ["*"]
