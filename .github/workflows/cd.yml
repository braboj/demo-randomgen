# separate terms of service, privacy policy, and support
# documentation.

# GitHub recommends pinning actions to a commit SHA.
# To get a newer version, you will need to update the SHA.
# You can also reference a tag or branch, but the action may change without warning.

name: Deploy Image

on: 
  workflow_dispatch:
  push:
    tags:
      - '*'
      
jobs:
  push_to_registry:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v7

      - name: Build and push Docker image
        uses: mr-smithers-excellent/docker-build-push@v7.0
        with:
          image: braboj/randomgen
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          addLatest: true
          pushImage: true

      # Tell Render to pull the freshly pushed image and redeploy. The hook URL
      # is a per-service secret (RENDER_DEPLOY_HOOK_URL); if it is unset the step
      # is skipped so the workflow still succeeds.
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "Triggering Render deploy..."
            curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
          else
            echo "RENDER_DEPLOY_HOOK_URL not set; skipping Render deploy." >&2
          fi
