# Continuous delivery: on a release tag, build and publish the Docker image to
# Docker Hub, then trigger the Render redeploy. Tag-triggered only.
#
# This workflow uses a third-party action (docker-build-push). Actions are
# pinned by commit SHA (Dependabot keeps the pins current); the trailing
# comment records the human-readable version.

name: CD

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  push_to_registry:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      - name: Build and push Docker image
        uses: mr-smithers-excellent/docker-build-push@ef432483bd0252dd948d1d11e60c96a1c93646a9  # v7.0
        with:
          image: braboj/randomgen
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          addLatest: true
          pushImage: true

      # Tell Render to pull the freshly pushed image and redeploy. The hook URL
      # is a per-service secret (RENDER_DEPLOY_HOOK_URL); if it is unset the step
      # is skipped so the workflow still succeeds.
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "Triggering Render deploy..."
            curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
          else
            echo "RENDER_DEPLOY_HOOK_URL not set; skipping Render deploy." >&2
          fi
