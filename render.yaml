# Render Blueprint — deploys the RandomGen container as a free web service.
# Spec: https://render.com/docs/blueprint-spec
#
# First-time setup: in the Render dashboard choose New > Blueprint, connect
# this repository, and Render provisions the service from this file. Render
# injects the $PORT environment variable; the Dockerfile's gunicorn CMD binds
# ${PORT:-5000}, so no extra configuration is needed.
#
# Note: free instances spin down after ~15 min of inactivity and cold-start
# (~30-60s) on the next request. That is expected for a zero-cost demo.
services:
  - type: web
    name: randomgen
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: commit
