version: 2
updates:
  # Python dependencies. The "/" directory is scanned recursively, so this
  # one entry covers pyproject.toml in the root (runtime + dev/test extras)
  # and scripts/requirements.txt.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      python-dependencies:
        patterns: ["*"]

  # GitHub Actions used by the workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns: ["*"]
