<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RandomGen — discrete distribution sampler</title>
  <meta name="description"
        content="Generate random numbers from a configurable discrete distribution and score the sample with a Chi-Square test." />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <script>
    // Set the theme before first paint (stored choice, else system) to avoid
    // a flash of the wrong theme. The toggle wiring lives in app.js.
    (function () {
      try {
        var stored = localStorage.getItem('randomgen-theme');
        var prefersDark = window.matchMedia
          && window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute(
          'data-theme', stored || (prefersDark ? 'dark' : 'light'));
      } catch (e) { /* storage blocked — fall back to the default light theme */ }
    })();
  </script>
</head>
<body>
  <a class="skip-link" href="#controls">Skip to controls</a>

  <header class="masthead">
    <div class="wrap">
      <div class="brand">
        <span class="dot" aria-hidden="true"></span>
        <h1>RandomGen</h1>
        <span class="version" title="Service version">v{{ version }}</span>
        <button type="button" id="theme-toggle" class="theme-switch" role="switch"
                aria-checked="false" aria-label="Dark theme">
          <span class="ts-ico ts-sun" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <circle cx="12" cy="12" r="4.2" />
              <path d="M12 2.5v2.2M12 19.3v2.2M4.6 4.6l1.6 1.6M17.8 17.8l1.6 1.6M2.5 12h2.2M19.3 12h2.2M4.6 19.4l1.6-1.6M17.8 6.2l1.6-1.6" />
            </svg>
          </span>
          <span class="ts-ico ts-moon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z" />
            </svg>
          </span>
          <span class="theme-switch-knob" aria-hidden="true">
            <span class="ts-moon">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z" />
              </svg>
            </span>
            <span class="ts-sun">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <circle cx="12" cy="12" r="4.2" />
                <path d="M12 2.5v2.2M12 19.3v2.2M4.6 4.6l1.6 1.6M17.8 17.8l1.6 1.6M2.5 12h2.2M19.3 12h2.2M4.6 19.4l1.6-1.6M17.8 6.2l1.6-1.6" />
              </svg>
            </span>
          </span>
        </button>
      </div>
      <p class="tagline">
        Draw numbers from a discrete distribution and check the fit with a
        Chi-Square test &mdash; every request is self-contained.
      </p>
    </div>
  </header>

  <main class="wrap">
    <form id="controls" class="panel" autocomplete="off">
      <div class="field">
        <label for="version-select">Generator</label>
        <div class="segmented" role="radiogroup" aria-label="Generator version">
          <input type="radio" name="apiVersion" id="v1" value="v1" checked />
          <label for="v1">v1 <span>inverse-CDF</span></label>
          <input type="radio" name="apiVersion" id="v2" value="v2" />
          <label for="v2">v2 <span>random.choices</span></label>
        </div>
      </div>

      <div class="field">
        <label for="quantity">Sample size
          <span class="hint">1&ndash;{{ max_numbers }}</span>
        </label>
        <input type="number" id="quantity" name="quantity"
               min="1" max="{{ max_numbers }}" value="{{ default_quantity }}" required />
      </div>

      <div class="field grow">
        <label for="dist">Distribution
          <span class="hint">value:probability pairs &mdash; weights sum to 1</span>
        </label>
        <input type="text" id="dist" name="dist" value="{{ default_dist }}"
               spellcheck="false" placeholder="-1:0.01,0:0.3,1:0.58,2:0.1,3:0.01" />
        <div class="presets" role="group" aria-label="Preset distributions">
          <span class="presets-label">Presets</span>
          <button type="button" class="preset" aria-pressed="false"
                  data-dist="1:0.2,2:0.2,3:0.2,4:0.2,5:0.2">Uniform</button>
          <button type="button" class="preset" aria-pressed="false"
                  data-dist="1:0.0625,2:0.25,3:0.375,4:0.25,5:0.0625">Normal</button>
          <button type="button" class="preset" aria-pressed="false"
                  data-dist="1:0.5,2:0.25,3:0.125,4:0.075,5:0.05">Skewed</button>
          <button type="button" class="preset" aria-pressed="false"
                  data-dist="1:0.4,2:0.05,3:0.1,4:0.05,5:0.4">Bimodal</button>
          <button type="button" class="preset" aria-pressed="false"
                  data-dist="1:0.94,2:0.02,3:0.02,4:0.01,5:0.01">Near-degenerate</button>
        </div>
      </div>

      <div class="actions">
        <button type="submit" id="generate">Generate</button>
        <button type="button" id="reset" class="ghost">Reset</button>
      </div>
    </form>

    <p id="status" class="status" role="status" aria-live="polite" hidden></p>

    <section id="results" class="results" hidden>
      <div class="verdict panel" id="verdict"></div>

      <div class="panel chart-panel">
        <div class="chart-head">
          <h2>Expected vs. observed</h2>
          <div class="legend">
            <span class="swatch expected"></span> expected
            <span class="swatch observed"></span> observed
          </div>
        </div>
        <div id="chart" class="chart" aria-label="Histogram of expected vs observed proportions"></div>
      </div>
    </section>
  </main>

  <footer class="wrap foot">
    <span>Stateless Flask service &middot; <code>scipy</code> Chi-Square</span>
    <nav>
      <a href="https://github.com/braboj/randomgen">Source</a>
      <a href="{{ url_for('randomgen.docs') }}">API docs</a>
      <a href="https://github.com/braboj/randomgen/tree/main/docs/arc42">Architecture</a>
    </nav>
  </footer>

  <script>
    window.RANDOMGEN_CONFIG = {{ config | tojson }};
  </script>
  <script src="{{ url_for('static', filename='js/app.js') }}" defer></script>
</body>
</html>
